<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avaliações - Game Store</title>
  <link rel="stylesheet" href="css/admin.css">
  <script defer src="js/main.js"></script>
</head>
<body>
  <div class="container">
      <aside class="sidebar">
  <h2><span class="logo">🎮</span> Game Store</h2>
  <p class="subtitle">Admin Dashboard</p>

  <nav class="menu">
    <a href="admin.html" class="active"><i class="icon">📊</i> Dashboard</a>
    <a href="empresas.html"><i class="icon">🏢</i> Empresas</a>
    <a href="categorias.html"><i class="icon">🏷️</i> Categorias</a>

  </nav>
</aside>

    <main class="content">
      <header class="header"><h1>Avaliações de Jogos</h1></header>

      <section class="form-section">
        <form>
          <select><option>Selecione o jogo</option></select>
          <textarea placeholder="Digite seu comentário"></textarea>
          <input type="number" min="1" max="5" placeholder="Nota (1-5)">
          <button type="submit">Enviar Avaliação</button>
        </form>
      </section>

      <section class="table-section">
        <h2>Comentários Recentes</h2>
        <table>
          <thead><tr><th>Jogo</th><th>Comentário</th><th>Nota</th></tr></thead>
          <tbody>
            <tr><td>The Witcher 3</td><td>Excelente jogo!</td><td>5</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
