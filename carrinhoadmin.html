<body>
  <div class="container">
     <aside class="sidebar">
  <h2><span class="logo">🎮</span> Game Store</h2>

  <nav class="menu">

            <tr><td>The Witcher 3</td><td>R$ 59,99</td><td><button>Adicionar</button></td></tr>
          </tbody>
        </table>
      </section>

      <section class="cart-summary">
        <h2>Resumo do Carrinho</h2>
        <ul><li>The Witcher 3 - R$59,99</li></ul>
